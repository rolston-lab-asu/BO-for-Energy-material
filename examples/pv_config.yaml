# pv_config.yaml
# Single source of truth for mp_fetch_pv.py and mp_nimo_pv.py
#
# Goal: find stable binary chalcogenide semiconductors whose band gap is
# close to the Shockley-Queisser optimum (~1.34 eV).

# Element pools — binary M-X chemical systems (cation × anion)
elements:
  cations: ["Cd", "Zn", "Cu", "Ag", "In", "Ga", "Ge", "Sn", "Pb", "Bi"]
  anions:  ["S", "Se", "Te"]

# Stability filter (eV/atom above convex hull)
# Relaxed slightly vs antiperovskite: many PV materials are metastable
hull_threshold: 0.1

# PV objective parameters
pv:
  bg_target:    1.34   # Shockley-Queisser optimum (eV)
  bg_min:       0.0    # band_gap=0 (metals) are kept; they just score poorly
  bg_max:       4.0    # exclude extreme wide-gap insulators

# File paths (relative to working directory)
files:
  candidates:  "pv_candidates.csv"
  proposals:   "pv_proposals.csv"
  nimo_csv:    "pv_nimo_working.csv"
  checkpoint:  "pv_checkpoint.json"
  plot_prefix: "pv_convergence"

# NIMO loop parameters
nimo:
  num_cycles:     50
  seed_cycles:    5
  num_objectives: 2    # formation_energy_per_atom  AND  |band_gap - bg_target|
  num_proposals:  1
  default_method: "PHYSBO"   # PHYSBO | BLOX | RE | NTS | AX

# Feature columns fed to NIMO (composition-based, no DFT needed upfront)
feature_cols:
  - "cation_eneg"      # Pauling electronegativity of cation
  - "anion_eneg"       # Pauling electronegativity of anion
  - "eneg_diff"        # |cation_eneg - anion_eneg|  — ionicity proxy
  - "cation_radius"    # atomic radius (Å)
  - "anion_radius"     # atomic radius (Å)
  - "cation_fraction"  # cation / (cation + anion) atomic fraction
  - "cation_max_oxid"  # max common oxidation state of cation

# Materials Project API settings
api:
  max_retries:       3
  retry_base_delay:  2.0
  inter_call_delay:  0.3
